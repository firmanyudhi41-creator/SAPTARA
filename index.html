<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="description" content="SAPTARA — Sapta Karakter Anak Nusantara. Ekspedisi Tujuh Samudra: Aplikasi gamifikasi kebiasaan baik bertema bahari untuk anak SD.">
  <meta name="theme-color" content="#0077B6">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <title>SAPTARA — Sapta Karakter Anak Nusantara</title>

  <!-- Favicon (Compass emoji as SVG) -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80'>🧭</text></svg>">

  <!-- CSS -->
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/student-pages.css">
  <link rel="stylesheet" href="css/teacher-pages.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <!-- App Container -->
  <div id="app">
    <!-- Page Content (rendered by router) -->
    <div id="page-content" style="transition: opacity 0.15s ease, transform 0.15s ease;">
      <!-- Loading state while JS loads -->
      <div class="landing-page" style="min-height:100vh; min-height:100dvh;">
        <div style="font-size:64px; animation: shipBob 3s ease-in-out infinite;">🧭</div>
        <h1 style="font-family:'Fredoka One',sans-serif; color:#FFB703; font-size:2rem; margin-top:16px;">SAPTARA</h1>
        <p style="opacity:0.6; font-size:13px; margin-top:8px;">Memuat petualangan...</p>
      </div>
    </div>
  </div>

  <!-- JavaScript (loaded in order — no modules needed) -->
  <!-- Utilities -->
  <script src="js/utils/helpers.js"></script>
  
  <!-- Data & State -->
  <script src="js/data.js"></script>
  
  <!-- Core -->
  <script src="js/router.js"></script>
  
  <!-- Components -->
  <script src="js/components/navbar.js"></script>
  <script src="js/components/radar-chart.js"></script>
  <script src="js/components/ocean-map.js"></script>
  <script src="js/components/ship-evolution.js"></script>
  <script src="js/components/photo-logbook.js"></script>
  <script src="js/components/leaderboard.js"></script>
  <script src="js/components/mascot.js"></script>
  
  <!-- Pages: Student -->
  <script src="js/pages/landing.js"></script>
  <script src="js/pages/student-map.js"></script>
  <script src="js/pages/student-logbook.js"></script>
  <script src="js/pages/student-compass.js"></script>
  <script src="js/pages/student-ship.js"></script>
  <script src="js/pages/student-leaderboard.js"></script>
  
  <!-- Pages: Teacher -->
  <script src="js/pages/teacher-feed.js"></script>
  <script src="js/pages/teacher-analytics.js"></script>
  <script src="js/pages/teacher-rewards.js"></script>
  <script src="js/pages/teacher-crew.js"></script>
  
  <!-- App Init (must be last) -->
  <script src="js/app.js"></script>
</body>
</html>
